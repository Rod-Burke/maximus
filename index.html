<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saint Max</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="logo-sym">✞</div>
                <h1>Saint Max</h1>
            </div>
            <div class="header-actions">
                <button id="tasks-btn" class="icon-btn" title="Tasks Dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                </button>
                <button id="history-btn" class="icon-btn" title="Message History">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Voice View -->
        <main id="voice-view">
            <div class="orb-container">
                <div class="orb" id="voice-trigger">
                    <div class="orb-core"></div>
                    <div class="orb-ring"></div>
                </div>
                <p id="status-text">Tap to speak to Maximus</p>
                <div id="countdown-bar" class="countdown-bar"></div>
                <div id="action-buttons" class="action-buttons hidden">
                    <button id="undo-btn" class="action-btn undo-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                        </svg>
                        <span>Undo Last</span>
                    </button>
                    <button id="edit-last-btn" class="action-btn edit-last-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        <span>Edit Last</span>
                    </button>
                </div>
            </div>
            
            <div id="chat-output" class="chat-output">
                <!-- AI Responses appear here -->
            </div>
        </main>

        <!-- History Panel (hidden by default) -->
        <div id="history-panel" class="history-panel hidden">
            <div class="history-header">
                <h2>Message History</h2>
                <button id="close-history" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="history-list" class="history-list">
                <!-- Messages populated by JS -->
            </div>
        </div>

        <!-- Tasks Panel (hidden by default) -->
        <div id="tasks-panel" class="history-panel hidden">
            <div class="history-header">
                <h2>Tasks & Events</h2>
                <button id="close-tasks" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="tasks-list" class="history-list tasks-list">
                <!-- Tasks populated by JS -->
            </div>
        </div>

        <!-- Task Detail Modal -->
        <div id="task-detail-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Task Details</h2>
                    <button id="close-modal" class="icon-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <label class="modal-label">Content</label>
                    <textarea id="modal-content-input" class="modal-input" rows="3"></textarea>
                    
                    <label class="modal-label">Notes / Instructions</label>
                    <textarea id="modal-notes-input" class="modal-input" rows="2" placeholder="Add extra notes..."></textarea>

                    <div class="modal-row">
                        <div class="modal-field">
                            <label class="modal-label">Type</label>
                            <select id="modal-type" class="modal-select">
                                <option value="task">Task</option>
                                <option value="event">Event</option>
                                <option value="observation">Observation</option>
                                <option value="idea">Idea</option>
                                <option value="reference">Reference</option>
                                <option value="person_note">Person Note</option>
                            </select>
                        </div>
                        <div class="modal-field">
                            <label class="modal-label">Priority</label>
                            <select id="modal-priority" class="modal-select">
                                <option value="normal">Normal</option>
                                <option value="high">High</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                    </div>

                    <div class="modal-row">
                        <div class="modal-field">
                            <label class="modal-label">Due Date</label>
                            <input type="date" id="modal-due-date" class="modal-input">
                        </div>
                        <div class="modal-field">
                            <label class="modal-label">Recurrence</label>
                            <select id="modal-recurrence" class="modal-select">
                                <option value="">None</option>
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly</option>
                                <option value="monthly">Monthly</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="modal-delete-btn" class="modal-btn modal-btn-danger">Delete</button>
                    <button id="modal-save-btn" class="modal-btn modal-btn-primary">Save Changes</button>
                </div>
            </div>
        </div>

        <footer>
            <div class="input-tray">
                <textarea id="text-input" rows="1" placeholder="Type a thought..." autocomplete="off"></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- PWA Installation Prompt (Custom) -->
    <div id="install-banner" class="banner hidden">
        <p>Add Maximus to your home screen</p>
        <button id="install-btn">Install</button>
    </div>

    <script src="app.js?v=4"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
