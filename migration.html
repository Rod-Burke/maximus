<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maximus Sync Migration</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            padding: 20px; 
            background-color: #0f172a; 
            color: #fff; 
            overflow: auto !important; 
            height: auto !important; 
            min-height: 100vh;
        }
        .migration-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .columns-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .columns-container { grid-template-columns: 1fr; }
        }
        .col-section {
            background-color: var(--panel-bg);
            border-radius: var(--border-radius);
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .col-section h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mig-task {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #e0e0e0;
        }
        .mig-task h3 { margin: 0 0 5px 0; font-size: 1rem; color: #fff; }
        .mig-task .meta { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; }
        .mig-task-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .btn-small {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            background-color: #3b82f6;
            color: #fff;
        }
        .btn-small.danger { background-color: #ef4444; }
        .btn-small.secondary { background-color: #555; }
        
        .match-compare {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .match-side {
            padding: 5px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7rem;
            background: #3b82f6;
            color: white;
            margin-bottom: 4px;
        }
        .primary-btn {
            background-color: #fff;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="migration-header">
        <h1 style="color: #fff; margin: 0;">Google Tasks Migration</h1>
        <div style="display: flex; gap: 10px;">
            <button id="refresh-btn" class="primary-btn">Fetch Data</button>
            <a href="index.html" class="primary-btn" style="text-decoration:none; background:#444; color: #fff; display: inline-flex; align-items: center;">Back to Maximus</a>
        </div>
    </div>

    <div id="status-message" style="margin-bottom: 20px; font-weight: bold; color: #60a5fa;">Click "Fetch Data" to load tasks.</div>

    <div class="columns-container">
        <div class="col-section" id="col-google">
            <h2>Google Only <span id="count-google" class="badge">0</span></h2>
            <div class="desc" style="font-size:0.8rem; margin-bottom:10px; color:#888;">Tasks in Google Tasks without a match in Open Brain.</div>
            <div id="list-google"></div>
        </div>

        <div class="col-section" id="col-brain">
            <h2>Brain Only <span id="count-brain" class="badge">0</span></h2>
            <div class="desc" style="font-size:0.8rem; margin-bottom:10px; color:#888;">Tasks in Open Brain not linked to Google Tasks.</div>
            <div id="list-brain"></div>
        </div>

        <div class="col-section" id="col-matched">
            <h2>Matched <span id="count-matched" class="badge">0</span></h2>
            <div class="desc" style="font-size:0.8rem; margin-bottom:10px; color:#888;">Tasks that exist in both systems.</div>
            <div id="list-matched"></div>
        </div>
    </div>

    <script src="migration.js"></script>
</body>
</html>
